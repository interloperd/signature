<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Signature</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #f4f1ec; color: #2B544E;
    display: flex; justify-content: center;
    padding: 24px 16px; min-height: 100vh;
  }
  .card {
    background: #fff; border-radius: 16px; padding: 24px;
    width: 100%; max-width: 520px; box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { font-size: 14px; color: #826858; margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  input[type=text] {
    width: 100%; padding: 12px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 15px; margin-bottom: 16px;
  }
  .pad-wrap {
    border: 2px dashed #A8BCF6; border-radius: 12px;
    background: #fafafa; position: relative; touch-action: none;
  }
  canvas { display: block; width: 100%; height: 220px; border-radius: 12px; }
  .hint {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); color: #bbb;
    font-size: 14px; pointer-events: none;
  }
  .actions { display: flex; gap: 10px; margin-top: 16px; }
  button {
    flex: 1; padding: 13px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .clear { background: #eee; color: #555; }
  .save { background: #2B544E; color: #fff; }
  .save:disabled { opacity: .4; cursor: not-allowed; }
  .msg { margin-top: 14px; font-size: 14px; text-align: center; min-height: 18px; }
  .msg.ok { color: #2B544E; }
  .msg.err { color: #b3261e; }
</style>
</head>
<body>
  <div class="card">
    <h1>Votre signature</h1>
    <p class="sub">Signez avec votre doigt dans le cadre ci-dessous.</p>

    <label for="nom">Nom</label>
    <input type="text" id="nom" placeholder="Prénom Nom">

    <div class="pad-wrap">
      <canvas id="pad"></canvas>
      <span class="hint" id="hint">✍️ Signez ici</span>
    </div>

    <div class="actions">
      <button class="clear" onclick="clearPad()">Effacer</button>
      <button class="save" id="saveBtn" onclick="send()" disabled>Envoyer</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>

<script>
// ⚠️ Remplace ce lien par TON endpoint Formspree (voir instructions)
const FORMSPREE_URL = "https://formspree.io/f/xojzrqlq";

const canvas = document.getElementById('pad');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const saveBtn = document.getElementById('saveBtn');
const msg = document.getElementById('msg');
let drawing = false, hasSigned = false;

function resize() {
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  ctx.lineJoin = 'round'; ctx.strokeStyle = '#2B544E';
}
window.addEventListener('resize', resize);
resize();

function pos(e) {
  const r = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
function start(e){drawing=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();}
function move(e){
  if(!drawing)return;
  const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();
  if(!hasSigned){hasSigned=true;hint.style.display='none';saveBtn.disabled=false;}
  e.preventDefault();
}
function end(){drawing=false;}
canvas.addEventListener('mousedown',start);
canvas.addEventListener('mousemove',move);
canvas.addEventListener('mouseup',end);
canvas.addEventListener('touchstart',start);
canvas.addEventListener('touchmove',move);
canvas.addEventListener('touchend',end);

function clearPad(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hasSigned=false;hint.style.display='block';saveBtn.disabled=true;msg.textContent='';
}

function buildPng(){
  const out=document.createElement('canvas');
  out.width=canvas.width;out.height=canvas.height;
  const o=out.getContext('2d');
  o.fillStyle='#fff';o.fillRect(0,0,out.width,out.height);
  o.drawImage(canvas,0,0);
  return out.toDataURL('image/png');
}

async function send(){
  const nom = document.getElementById('nom').value.trim() || 'Anonyme';
  saveBtn.disabled = true;
  msg.className = 'msg'; msg.textContent = 'Envoi en cours…';

  try {
    const res = await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nom: nom,
        date: new Date().toLocaleString('fr-FR'),
        signature_png: buildPng()  // image en base64 dans le mail
      })
    });
    if (res.ok) {
      msg.className = 'msg ok';
      msg.textContent = 'Signature envoyée. Merci !';
    } else {
      throw new Error('refus serveur');
    }
  } catch (e) {
    msg.className = 'msg err';
    msg.textContent = "Échec de l'envoi. Réessayez.";
    saveBtn.disabled = false;
  }
}
</script>
</body>
</html>
